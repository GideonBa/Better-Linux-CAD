name: Block 38 Geometry Verify

on:
  push:
    branches:
      - block38-generic-relationship-intent

permissions:
  contents: write

jobs:
  geometry-build-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install full development dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config git clang-format clang-tidy \
            libocct-foundation-dev libocct-modeling-data-dev libocct-modeling-algorithms-dev \
            libocct-data-exchange-dev libocct-visualization-dev libocct-ocaf-dev libocct-draw-dev \
            qt6-base-dev libeigen3-dev libtbb-dev nlohmann-json3-dev libfmt-dev libspdlog-dev catch2

      - name: Complete Geometry build and tests
        run: cmake --workflow --preset dev-geometry-build-test

      - name: Focused compatibility regression tests
        run: |
          ./build/dev-geometry/blcad_geometry_tests "[geometry][assembly-target-compatibility]"
          ./build/dev-geometry/blcad_geometry_tests "[geometry][assembly-cross-hierarchy-target-compatibility]"

      - name: Remove temporary verification workflow
        run: rm .github/workflows/block38-geometry-verify.yml

      - name: Commit verified branch state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Verify Block 38 Geometry integration"
          git push origin HEAD:block38-generic-relationship-intent
