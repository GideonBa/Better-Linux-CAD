name: Block 110 Fix Sketch Toolbar Visibility

on:
  push:
    branches:
      - block-110-sketch-live-drag

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: block-110-sketch-live-drag
      - name: Synchronize QWidgetAction visibility
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def patch(path, old, new):
              p = Path(path)
              text = p.read_text()
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'anchor missing in {path}: {old[:100]!r}')
              p.write_text(text.replace(old, new, 1))

          patch('include/blcad/gui/main_window.hpp',
                '''  QWidget* sketch_command_groups_{nullptr};\n  QLineEdit* sketch_numeric_hud_{nullptr};\n''',
                '''  QWidget* sketch_command_groups_{nullptr};\n  QAction* sketch_command_groups_action_{nullptr};\n  QLineEdit* sketch_numeric_hud_{nullptr};\n  QAction* sketch_numeric_hud_action_{nullptr};\n''')

          patch('src/gui/main_window.cpp',
                '''  command_bar->addWidget(sketch_command_groups_);\n\n  sketch_numeric_hud_ = new QLineEdit(command_bar);\n''',
                '''  sketch_command_groups_action_ = command_bar->addWidget(sketch_command_groups_);\n\n  sketch_numeric_hud_ = new QLineEdit(command_bar);\n''')

          patch('src/gui/main_window.cpp',
                '''  command_bar->addWidget(sketch_numeric_hud_);\n  connect(sketch_numeric_hud_, &QLineEdit::textChanged, this, [this](const QString& text) {\n''',
                '''  sketch_numeric_hud_action_ = command_bar->addWidget(sketch_numeric_hud_);\n  connect(sketch_numeric_hud_, &QLineEdit::textChanged, this, [this](const QString& text) {\n''')

          patch('src/gui/main_window.cpp',
                '''  if (sketch_command_groups_)\n    sketch_command_groups_->setVisible(active);\n  if (sketch_numeric_hud_)\n    sketch_numeric_hud_->setVisible(active &&\n                                     sketch_workspace_.stage() == GuiSketchInteractionStage::NumericInput);\n''',
                '''  if (sketch_command_groups_action_)\n    sketch_command_groups_action_->setVisible(active);\n  if (sketch_command_groups_)\n    sketch_command_groups_->setVisible(active);\n  const bool numeric_hud_visible =\n      active && sketch_workspace_.stage() == GuiSketchInteractionStage::NumericInput;\n  if (sketch_numeric_hud_action_)\n    sketch_numeric_hud_action_->setVisible(numeric_hud_visible);\n  if (sketch_numeric_hud_)\n    sketch_numeric_hud_->setVisible(numeric_hud_visible);\n''')
          PY
      - name: Commit lifecycle fix
        run: |
          if git diff --quiet -- include/blcad/gui/main_window.hpp src/gui/main_window.cpp; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add include/blcad/gui/main_window.hpp src/gui/main_window.cpp
          git commit -m "Synchronize Sketch toolbar action visibility"
          git push origin HEAD:block-110-sketch-live-drag
