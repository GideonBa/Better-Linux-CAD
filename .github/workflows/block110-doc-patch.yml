          path = 'docs/gui-sketch-workbench-mvp7.md'
          if '## Block-110 direct-manipulation integration' not in read(path):
              text = read(path).rstrip() + '''\n\n## Block-110 direct-manipulation integration\n\nThe MVP-7 Sketch workbench remains a validation/transaction client over historical Sketch intent. Block\n110 does not move live drag authority into `GuiSketchWorkbench`. `GuiSketchDragController` consumes\nBlock-108 topology and Block-109 solving; successful release enters the same\n`GuiDocumentSession::commit_part_transaction(...)` authority used by validation workbenches.\n\nThe final solved topology is materialized and re-migrated exactly before `PartDocument::update_sketch`.\nLive handle positions, pointer samples, temporary drag constraints, and preview Sketches remain\ntransient. This preserves MVP-7 atomic recompute/undo semantics while adding direct manipulation.\n'''
              write(path, text)

          # File-format derived-state classification.
          path = 'docs/file-format.md'
          replace(path,
                  'The save format stores parametric and semantic model intent. OCCT shapes, hierarchy traversal state, occurrence graphs, transform authorities, generated-topology producer classification/recovery results, resolved geometry, residuals, Jacobians, solve/motion results, freshness snapshots, proposals, diagnostics, and exchange products are derived.',
                  'The save format stores parametric and semantic model intent. OCCT shapes, hierarchy traversal state, occurrence graphs, transform authorities, generated-topology producer classification/recovery results, resolved geometry, residuals, Jacobians, solve/motion results, freshness snapshots, proposals, diagnostics, Block-110 semantic drag handles, pointer samples, temporary drag targets/augmented topology, live previews, and exchange products are derived. Block 110 adds no JSON schema field.')

          # Diagnostics are now continuously consumed by drag GUI.
          path = 'docs/sketch-solver-diagnostics-mvp.md'
          replace(path,
                  '''Block 110 may publish the Block-109 remaining DOF and solve status into the existing Sketch status\nsurface while implementing live drag.''',
                  '''Block 110 publishes Block-109 baseline/live remaining DOF and solve status into the existing Sketch\nstatus surface. Conflicting, non-convergent, or invalid-reference drag solves refuse/cancel the preview\nwithout persistent mutation.''')
          PY
      - name: Commit documentation
        run: |
          if git diff --quiet -- docs README.md; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs README.md
          git commit -m "Document Block 110 solver-backed Sketch dragging"
          git push origin HEAD:block-110-sketch-live-drag
