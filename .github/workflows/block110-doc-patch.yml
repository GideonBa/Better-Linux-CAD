          # Shared topology consumer update.
          path = 'docs/sketch-shared-topology-mvp8.md'
          replace(path, 'Status: implemented in Block 108. Block 109 is the first general solver consumer.',
                        'Status: implemented in Block 108. Block 109 is the general solver consumer and Block 110 is the first direct-manipulation consumer.')
          replace(path,
                  '''Block 109 adds no topology-schema fields for solver variables, residuals, Jacobians, rank, DOF,\nconvergence, or conflict diagnostics. Those values are derived on demand.''',
                  '''Blocks 109–110 add no topology-schema fields for solver variables, residuals, Jacobians, rank, DOF,\nconvergence, drag handles, pointer samples, temporary drag point/entity ids, or live previews. Those\nvalues are derived/transient. Block 110 strips `__gui.drag.pointer` / `__gui.drag.center` from solver\noutput and rebuilds a topology containing exactly the source point/entity/dependency identities before\npreview or commit.''')
          replace(path,
                  '''Block 109 solving does not automatically call this bridge. Solve results are disposable derived\ncandidates. A later command/interaction owner must explicitly choose the validated persistent commit\nboundary.''',
                  '''Block 109 solving does not automatically call this bridge. Block 110 is one explicit interaction owner:\nit requires source-only solved topology to materialize and re-migrate exactly for preview, and repeats\nthe equality check inside one freshness-checked document transaction on release.''')
          sub(path, r'## Next boundary.*\Z',
              '''## Next boundary\n\nBlock 111 uses the same stable point/entity topology for basic Sketch creation. Snap positions may seed\nnew point coordinates, but only explicit topology/edit commands create persistent point identity or\nshared connectivity.\n''')

          # Solver's first live consumer.
          path = 'docs/sketch-planar-constraint-solver-mvp8.md'
          sub(path, r'## Next boundary.*\Z',
              '''## Block-110 live drag consumer\n\nBlock 110 is the first continuous GUI consumer of this solver. It does not add solver mathematics. A\nsemantic handle maps to one of four transient target forms:\n\n```text\nPoint        -> Coincident(controlled point, temporary reference point)\nLineMidpoint -> Midpoint(temporary reference point, line)\nArcCenter    -> Concentric(arc, temporary reference center entity)\nArcRadius    -> Radial(arc, source-center-to-pointer distance)\n```\n\nThe temporary constraint id is `zz.gui.drag.target`; temporary topology ids are\n`__gui.drag.pointer` and `__gui.drag.center`. They exist only in the augmented solve request and are\nremoved before preview/commit. `FullyConstrained`, `UnderConstrained`, and `Redundant` are accepted\npreview states; `Conflicting`, `NonConvergent`, and `InvalidReference` refuse the drag candidate.\n\nMove samples may be coalesced by the GUI, but the exact release pointer is synchronously solved before\ncommit. Qt renders the derived solve result/DOF and never evaluates substitute residuals.\n\nCanonical integration contract: `docs/gui-sketch-solver-drag-mvp8.md`.\n\n## Next boundary\n\nBlock 111 reuses the solver for disposable candidates produced by basic creation commands. Automatic\nconstraint authoring remains Block 114 and dimension editing remains Block 115.\n''')

          # User-facing architecture status.
          path = 'docs/user-interface.md'
          replace(path,
                  'Blocks 106–109 establish the contextual Sketch workspace, transient plane\ninteraction, persistent shared planar topology, and deterministic general planar solver. Block 110 is\nthe current next technical step and connects mouse dragging to those authorities.',
                  'Blocks 106–110 establish the contextual Sketch workspace, transient plane interaction, persistent\nshared planar topology, deterministic general planar solver, and solver-backed semantic-handle mouse\ndragging. Block 111 is the current next technical step and adds basic creation tools.')
          replace(path, 'Block 110  semantic handles / live drag solve invocation / status publication / release commit',
                        'Block 110  semantic handles / live drag solve invocation / status publication / release commit — implemented')
          replace(path,
                  '''Block 109 means DOF/Solve have a real headless Core producer. The current shell does not yet continuously\ninvoke it, so `DOF: —` / `Solve: Not evaluated` can still appear outside a solver-aware command. Block\n110 owns the first live solve/status publication during drag.''',
                  '''Block 109 provides the headless producer and Block 110 continuously publishes baseline/live drag\n`SketchSolveResult` status and remaining DOF through the existing status row. The UI does not count\nendpoints or glyphs to estimate DOF.''')
          replace(path, '## Block-110 direct manipulation boundary', '## Solver-backed Sketch direct manipulation through Block 110')
          replace(path,
                  '''Block 110 is the first GUI consumer that composes Blocks 107–109:''',
                  '''Block 110 implements the first GUI consumer that composes Blocks 107–109:''')
          replace(path,
                  '''Preview never mutates PartDocument. `Esc`, lost capture, fixed/fully-constrained refusal, or failed\nsolve restores the exact pre-drag snapshot and clears preview. Solver throttling/coalescing must not\ndrop the final pointer position.''',
                  '''Preview never mutates `PartDocument`. Semantic handles are drawn as a separate cyan overlay and hit\ntested within 9 DIP by screen distance then stable handle id, without changing Block-107 hit priority.\n`Esc`, lost capture/window deactivation, reference geometry, incompatible fully constrained geometry,\nor failed solve restores the source preview and creates no history entry. Pointer moves coalesce to the\nlatest pending sample; release synchronously flushes the exact final snapped position.''')
          replace(path,
