name: Block 106 final verification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Advance Block 106 status documentation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"expected status text not found in {path}: {old!r}")
              file.write_text(text.replace(old, new, 1))

          replace(
              "docs/mvp-plan.md",
              'implemented_through: Block 105\ncurrent_block: 106\ncurrent_boundary: Interactive Sketch workspace and command lifecycle\ncurrent_tag: "[gui][sketch-workspace]"',
              'implemented_through: Block 106\ncurrent_block: 107\ncurrent_boundary: Plane interaction, hit testing, snapping, and inference preview\ncurrent_tag: "[gui][sketch-hit-test]"',
          )
          replace(
              "docs/mvp-plan.md",
              'mvp_8: "Interactive Sketcher — Blocks 106–121 planned; Block 106 next"',
              'mvp_8: "Interactive Sketcher — Block 106 implemented; Blocks 107–121 planned; Block 107 next"',
          )
          replace(
              "docs/mvp-plan.md",
              '## Current next technical step — Block 106\n\nBegin Interactive Sketcher MVP-8 with the contextual Sketch workspace and command lifecycle in\n`docs/interactive-sketcher-sequence-mvp8.md`.',
              '''## Block 106 — Interactive Sketch workspace and command lifecycle — Implemented

The GUI now has a contextual `GuiWorkspace::Sketch` over the existing Block-95/96 task and
transaction authority. `Enter Sketch` and `Finish Sketch` capture and restore workspace, semantic
selection, viewport camera state, selection filters, and transient Dim/Isolate surroundings focus.
The frozen command groups, browser-section contract, numeric HUD, crosshair, cursor/snap/DOF/solve
status surfaces, staged `Esc`, repeatable commands, and transient handle/drag-candidate lifecycle are
implemented. The first numeric line path validates on a disposable Sketch copy before Preview and
commits through the existing Block-99 transaction path. See
`docs/gui-interactive-sketch-workspace-mvp8.md`.

```text
[gui][sketch-workspace]
[gui][sketch-command-lifecycle]
[gui][viewport][gui][navigation]
```

## Current next technical step — Block 107

Continue Interactive Sketcher MVP-8 with device-independent plane mapping, zoom-stable hit testing,
box selection, grid, snapping, and inference preview in
`docs/interactive-sketcher-sequence-mvp8.md`.''',
          )

          replace(
              "docs/architecture-summary.md",
              '''## Planned interactive Sketch authority after Block 105

Blocks 106–121 in `docs/interactive-sketcher-sequence-mvp8.md` add shared planar point topology, a
headless deterministic constraint solver, transactional mouse dragging, direct creation and modify
tools, in-canvas dimensions, region recognition, and Interactive Sketch3D. Qt owns hover, screen
mapping, glyph placement, and candidate presentation; Core owns persistent points, entities,
constraints, and dimensions.''',
              '''## Interactive Sketch authority after Block 106

Block 106 establishes the contextual planar `GuiWorkspace::Sketch` without moving model authority
into Qt. `GuiSketchWorkspace` projects the frozen Sketch interaction stages onto the existing
generic task authority, while `MainWindow` owns only transient HUD, focus, camera bookmark,
selection-filter, crosshair, and surroundings-presentation state. Numeric line candidates validate
on a disposable Core Sketch and persistent commit still flows through the existing atomic Part
transaction path. `OcctViewport` restores Eye/Target/Up/Scale/projection state and keeps Dim/Isolate
Sketch focus transient.

Blocks 107–121 in `docs/interactive-sketcher-sequence-mvp8.md` add device-independent plane
interaction, shared planar point topology, a headless deterministic constraint solver, transactional
mouse dragging, direct creation and modify tools, in-canvas dimensions, region recognition, and
Interactive Sketch3D. Qt owns hover, screen mapping, glyph placement, and candidate presentation;
Core owns persistent points, entities, constraints, and dimensions. The implemented Block-106
contract is canonical in `docs/gui-interactive-sketch-workspace-mvp8.md`.''',
          )
          replace(
              "docs/architecture-summary.md",
              '- `docs/interactive-sketcher-sequence-mvp8.md`\n- `docs/interactive-modeling-sequence-mvp9.md`',
              '- `docs/interactive-sketcher-sequence-mvp8.md`\n- `docs/gui-interactive-sketch-workspace-mvp8.md`\n- `docs/interactive-modeling-sequence-mvp9.md`',
          )
          replace(
              "docs/architecture-summary.md",
              'headless equivalence. The next technical step is Block 106 Interactive Sketch workspace and command\nlifecycle.',
              'headless equivalence. Block 106 adds the contextual Sketch workspace, staged command lifecycle,\nnumeric HUD, camera/selection restoration, transient Sketch focus, and explicit status surfaces. The\nnext technical step is Block 107 plane interaction, hit testing, box selection, grid, snapping, and\ninference preview.',
          )

          replace(
              "docs/development-setup.md",
              'Qt 6 packages for the completed Blocks 95–105 GUI Validation phase',
              'Qt 6 packages for the completed Blocks 95–105 GUI Validation phase and Interactive Sketcher MVP-8',
          )
          replace(
              "docs/development-setup.md",
              '## GUI build and Blocks 95–105 tests',
              '## GUI build and interactive GUI tests',
          )
          dev = Path("docs/development-setup.md")
          text = dev.read_text()
          marker = "## Block 106 focused GUI proof"
          if marker not in text:
              text += '''

## Block 106 focused GUI proof

The contextual Sketch workspace, staged command lifecycle, viewport camera/focus behavior, and
end-to-end shell path are covered by:

```bash
./build/dev-gui/blcad_gui_tests "[gui][sketch-workspace]"
./build/dev-gui/blcad_gui_tests "[gui][sketch-command-lifecycle]"
./build/dev-gui/blcad_gui_tests "[gui][viewport][gui][navigation]"
```

Block 107 is the current implementation handoff. Its focused tags are
`[gui][sketch-hit-test]`, `[gui][sketch-snap]`, and `[gui][sketch-box-selection]`.
'''
              dev.write_text(text)

          status_files = [
              "docs/mvp-plan.md",
              "docs/project-goal.md",
              "docs/architecture-summary.md",
              "docs/user-interface.md",
              "docs/development-setup.md",
              "docs/interactive-sketcher-sequence-mvp8.md",
          ]
          stale = []
          for path in status_files:
              text = Path(path).read_text()
              for phrase in (
                  "current_block: 106",
                  "Block 106 next",
                  "Current next technical step — Block 106",
                  "The immediate next step is Block 106",
                  "The next technical step is Block 106",
              ):
                  if phrase in text:
                      stale.append(f"{path}: {phrase}")
          if stale:
              raise SystemExit("stale Block-106 handoff remains:\n" + "\n".join(stale))
          PY

      - name: Commit documentation handoff
        shell: bash
        run: |
          if ! git diff --quiet -- docs; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs
            git commit -m "Block 106: advance documentation to Block 107"
            git push origin HEAD:main
          fi

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config git \
            libocct-foundation-dev libocct-modeling-data-dev libocct-modeling-algorithms-dev \
            libocct-data-exchange-dev libocct-visualization-dev libocct-ocaf-dev libocct-draw-dev \
            qt6-base-dev libeigen3-dev libtbb-dev nlohmann-json3-dev libfmt-dev libspdlog-dev catch2

      - name: Core workflow
        run: cmake --workflow --preset dev-build-test

      - name: Geometry workflow
        run: cmake --workflow --preset dev-geometry-build-test

      - name: Configure GUI
        run: cmake --preset dev-gui

      - name: Build GUI
        run: cmake --build --preset dev-gui

      - name: Test GUI
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build/dev-gui --output-on-failure
