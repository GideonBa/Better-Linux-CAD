name: Block 110 Register Test

on:
  push:
    branches:
      - block-110-sketch-live-drag

permissions:
  contents: write

jobs:
  register:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: block-110-sketch-live-drag
      - name: Register focused test
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('CMakeLists.txt')
          text = path.read_text()
          anchor = '      tests/gui/gui_sketch_interaction_tests.cpp\n'
          insertion = anchor + '      tests/gui/gui_sketch_drag_tests.cpp\n'
          if 'tests/gui/gui_sketch_drag_tests.cpp' not in text:
              if anchor not in text:
                  raise SystemExit('GUI test registration anchor not found')
              text = text.replace(anchor, insertion, 1)
              path.write_text(text)
          PY
      - name: Commit registration
        run: |
          if git diff --quiet -- CMakeLists.txt; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CMakeLists.txt
          git commit -m "Register Block 110 Sketch drag tests"
          git push origin HEAD:block-110-sketch-live-drag
