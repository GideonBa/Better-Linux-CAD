name: Block 109 Core Verify

on:
  push:
    branches:
      - block-109-planar-constraint-solver
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  core:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: block-109-planar-constraint-solver
      - name: Register Block 109 sources and tests
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('CMakeLists.txt')
          text = path.read_text()
          source_anchor = '  src/core/sketch_constraints.cpp\n'
          source_insert = (
              source_anchor
              + '  src/core/sketch_constraint_solver.cpp\n'
              + '  src/core/sketch_solver_legacy_adapter.cpp\n'
          )
          if 'src/core/sketch_constraint_solver.cpp' not in text:
              if source_anchor not in text:
                  raise SystemExit('Core source anchor not found')
              text = text.replace(source_anchor, source_insert, 1)
          test_anchor = '    tests/core/sketch_diagnostics_tests.cpp\n'
          test_insert = test_anchor + '    tests/core/sketch_constraint_solver_tests.cpp\n'
          if 'tests/core/sketch_constraint_solver_tests.cpp' not in text:
              if test_anchor not in text:
                  raise SystemExit('Core test anchor not found')
              text = text.replace(test_anchor, test_insert, 1)
          path.write_text(text)
          PY
      - name: Install Core dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build nlohmann-json3-dev catch2
      - name: Configure
        run: cmake --preset dev
      - name: Build Core tests
        run: cmake --build --preset dev
      - name: Run Block 109 focused tests
        run: |
          ./build/dev/blcad_core_tests "[core][sketch-solver]"
          ./build/dev/blcad_core_tests "[core][sketch-dof]"
          ./build/dev/blcad_core_tests "[core][sketch-conflict-diagnostics]"
      - name: Run full Core tests
        run: ctest --preset dev --output-on-failure
      - name: Persist CMake registration
        run: |
          if git diff --quiet -- CMakeLists.txt; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CMakeLists.txt
          git commit -m "Register Block 109 solver sources and tests"
          git push origin HEAD:block-109-planar-constraint-solver
