name: Block 39 Bootstrap

on:
  pull_request_target:
    branches:
      - main
    paths:
      - scripts/normalize_block39.py

permissions:
  contents: write
  pull-requests: write

jobs:
  patch-and-test:
    if: >-
      github.event.pull_request.number == 36 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'block39-generic-relationship-equations'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: block39-generic-relationship-equations
          fetch-depth: 0

      - name: Apply Block 39 patch
        run: |
          set -o pipefail
          python3 scripts/apply_block39.py 2>&1 | tee /tmp/block39-apply.log

      - name: Preserve typed target invariants and test syntax
        run: python3 scripts/normalize_block39.py

      - name: Install full development dependencies and formatter
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config git clang-format clang-tidy \
            libocct-foundation-dev libocct-modeling-data-dev libocct-modeling-algorithms-dev \
            libocct-data-exchange-dev libocct-visualization-dev libocct-ocaf-dev libocct-draw-dev \
            qt6-base-dev libeigen3-dev libtbb-dev nlohmann-json3-dev libfmt-dev libspdlog-dev catch2

      - name: Format Block 39 files
        run: |
          set -o pipefail
          clang-format -i \
            include/blcad/geometry/assembly_generic_relationship_equation_builder.hpp \
            include/blcad/geometry/assembly_hierarchy_constraint_equation_builder.hpp \
            src/core/assembly_constraint_graph_participation.hpp \
            src/geometry/assembly_generic_relationship_equation_builder.cpp \
            src/geometry/assembly_target_compatibility.cpp \
            src/geometry/assembly_constraint_numeric_system.hpp \
            src/geometry/assembly_constraint_numeric_system.cpp \
            src/geometry/assembly_hierarchy_constraint_equation_builder.cpp \
            tests/geometry/assembly_generic_relationship_equation_tests.cpp \
            2>&1 | tee /tmp/block39-format.log

      - name: Core build and tests
        run: |
          set -o pipefail
          cmake --workflow --preset dev-build-test 2>&1 | tee /tmp/block39-core.log

      - name: Geometry build and tests
        run: |
          set -o pipefail
          cmake --workflow --preset dev-geometry-build-test 2>&1 | tee /tmp/block39-geometry.log

      - name: Focused Block 39 and compatibility tests
        run: |
          set -o pipefail
          {
            ./build/dev-geometry/blcad_geometry_tests "[geometry][assembly-generic-relationships]"
            ./build/dev-geometry/blcad_geometry_tests "[geometry][assembly-generic-relationships-solver]"
            ./build/dev-geometry/blcad_geometry_tests "[geometry][assembly-generic-relationships-cross-hierarchy]"
            ./build/dev-geometry/blcad_geometry_tests "[geometry][assembly-generic-relationships-diagnostics]"
            ./build/dev-geometry/blcad_geometry_tests "[geometry][assembly-target-compatibility]"
            ./build/dev-geometry/blcad_geometry_tests "[geometry][assembly-cross-hierarchy-target-compatibility]"
          } 2>&1 | tee /tmp/block39-focused.log

      - name: Verify Block 39 integrity
        run: |
          rm scripts/normalize_block39.py
          git diff --check
          test ! -e scripts/apply_block39.py
          test ! -e scripts/normalize_block39.py
          test ! -e .github/workflows/block39-patch.yml
          grep -R "AssemblyGenericRelationshipEquationBuilder" -n include src tests
          grep -R "assembly-generic-relationships" -n tests docs

      - name: Commit verified Block 39
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Add generic relationship equations and shared solve integration"
          git push origin HEAD:block39-generic-relationship-equations

      - name: Report Block 39 failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          {
            echo 'Block 39 verification failed.'
            echo
            echo '```text'
            echo '--- apply ---'
            tail -n 30 /tmp/block39-apply.log 2>/dev/null || true
            echo '--- format ---'
            tail -n 30 /tmp/block39-format.log 2>/dev/null || true
            echo '--- core ---'
            tail -n 50 /tmp/block39-core.log 2>/dev/null || true
            echo '--- geometry ---'
            tail -n 100 /tmp/block39-geometry.log 2>/dev/null || true
            echo '--- focused ---'
            tail -n 60 /tmp/block39-focused.log 2>/dev/null || true
            echo '```'
          } > /tmp/block39-comment.md
          gh pr comment "$PR_URL" --body-file /tmp/block39-comment.md

      - name: Report verified Block 39
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr comment "$PR_URL" --body "Block 39 verification passed: complete Core and Geometry workflows, all four focused generic-relationship tags, and both target-compatibility regression tags succeeded; the verified implementation commit was pushed to the PR branch."
