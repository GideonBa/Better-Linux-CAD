name: Block 110 Fix Drag Lifecycle

on:
  push:
    branches:
      - block-110-sketch-live-drag

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: block-110-sketch-live-drag
      - name: Restore selection and inference state
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/gui/gui_sketch_drag_binder.cpp')
          text = path.read_text()
          replacements = {
              '''        restore_source_preview();\n        controller_->cancel();\n        publish_baseline_feedback();\n''':
              '''        restore_source_preview();\n        controller_->cancel();\n        if (viewport_ != nullptr) {\n          viewport_->set_sketch_inference_anchor(std::nullopt);\n          viewport_->set_sketch_selection_enabled(true);\n        }\n        publish_baseline_feedback();\n''',
              '''      viewport_->set_sketch_inference_anchor(std::nullopt);\n      publish_baseline_feedback();\n      window_.refresh_command_state();\n      return;\n''':
              '''      viewport_->set_sketch_inference_anchor(std::nullopt);\n      viewport_->set_sketch_selection_enabled(true);\n      publish_baseline_feedback();\n      window_.refresh_command_state();\n      return;\n''',
              '''    viewport_->set_sketch_inference_anchor(std::nullopt);\n    window_.refresh_command_state();\n    sync_controller();\n''':
              '''    viewport_->set_sketch_inference_anchor(std::nullopt);\n    viewport_->set_sketch_selection_enabled(true);\n    window_.refresh_command_state();\n    sync_controller();\n''',
          }
          for old, new in replacements.items():
              if old in text:
                  text = text.replace(old, new, 1)
              elif new not in text:
                  raise SystemExit(f'lifecycle patch anchor missing: {old[:100]!r}')
          path.write_text(text)
          PY
      - name: Commit lifecycle fix
        run: |
          if git diff --quiet -- src/gui/gui_sketch_drag_binder.cpp; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/gui/gui_sketch_drag_binder.cpp
          git commit -m "Restore Sketch selection after drag lifecycle"
          git push origin HEAD:block-110-sketch-live-drag
