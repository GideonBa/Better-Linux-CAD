name: Block 38 Bootstrap

on:
  pull_request_target:
    branches:
      - main
    paths:
      - scripts/apply_block38.py

permissions:
  contents: write
  pull-requests: write

jobs:
  patch-and-test:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'block38-generic-relationship-intent'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: block38-generic-relationship-intent
          fetch-depth: 0

      - name: Detect pending patch
        id: pending
        run: |
          if test -f scripts/apply_block38.py; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply Block 38 patch
        if: steps.pending.outputs.apply == 'true'
        run: python3 scripts/apply_block38.py

      - name: Format Block 38 files
        if: steps.pending.outputs.apply == 'true'
        run: |
          clang-format -i \
            include/blcad/core/assembly_constraint.hpp \
            src/core/assembly_constraint.cpp \
            src/core/assembly_constraint_graph.cpp \
            src/core/assembly_cross_hierarchy_constraint_graph.cpp \
            src/core/assembly_cross_hierarchy_motion_graph.cpp \
            src/core/assembly_constraint_graph_participation.hpp \
            src/core/assembly_document_json.cpp \
            src/core/project_json.cpp \
            src/geometry/assembly_target_compatibility.cpp \
            tests/core/assembly_generic_relationship_tests.cpp

      - name: Install Core dependencies
        if: steps.pending.outputs.apply == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build nlohmann-json3-dev catch2

      - name: Core build and tests
        if: steps.pending.outputs.apply == 'true'
        run: cmake --workflow --preset dev-build-test

      - name: Focused Block 38 tests
        if: steps.pending.outputs.apply == 'true'
        run: |
          ./build/dev/blcad_core_tests "[core][assembly-generic-relationship-intent]"
          ./build/dev/blcad_core_tests "[core][assembly-generic-relationship-json]"

      - name: Verify patch integrity
        if: steps.pending.outputs.apply == 'true'
        run: |
          git diff --check
          test ! -e scripts/apply_block38.py
          test ! -e .github/workflows/block38-patch.yml
          grep -R "AssemblyConstraintType::Coincident\|AssemblyConstraintType::Parallel\|AssemblyConstraintType::Perpendicular" -n include src tests

      - name: Commit Block 38
        if: steps.pending.outputs.apply == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Add generic relationship intent and JSON"
          git push origin HEAD:block38-generic-relationship-intent

      - name: Report verified Block 38
        if: steps.pending.outputs.apply == 'true' && success()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr comment "$PR_URL" --body "Block 38 bootstrap verification passed: complete Core workflow and both focused generic-relationship test tags succeeded; the verified implementation commit was pushed to the PR branch."
