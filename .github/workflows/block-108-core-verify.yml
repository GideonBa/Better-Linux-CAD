name: Block 108 Core Verify

on:
  pull_request:
    branches:
      - main

jobs:
  core:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Core dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config nlohmann-json3-dev catch2 libfmt-dev libspdlog-dev
      - name: Configure
        run: cmake --preset dev
      - name: Build Core tests
        run: cmake --build --preset dev
      - name: Run Core tests
        run: ctest --preset dev --output-on-failure
