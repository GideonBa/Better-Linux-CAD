name: Block 110 Fix Test Assertions

on:
  push:
    branches:
      - block-110-sketch-live-drag

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: block-110-sketch-live-drag
      - name: Fix test API and iterator assertions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tests/gui/gui_sketch_drag_tests.cpp')
          text = path.read_text()
          replacements = {
              '''  REQUIRE(session.undo_label().has_value());\n  CHECK(*session.undo_label() == "Drag sketch handle");\n''':
              '''  CHECK(session.undo_label() == "Drag sketch handle");\n''',
              '''  REQUIRE(window.session().undo_label().has_value());\n  CHECK(*window.session().undo_label() == "Drag sketch handle");\n''':
              '''  CHECK(window.session().undo_label() == "Drag sketch handle");\n''',
              '''  const auto* endpoint = std::find_if(\n''':
              '''  const auto endpoint = std::find_if(\n''',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          path.write_text(text)
          PY
      - name: Commit test fix
        run: |
          if git diff --quiet -- tests/gui/gui_sketch_drag_tests.cpp; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/gui/gui_sketch_drag_tests.cpp
          git commit -m "Fix Sketch drag test assertions"
          git push origin HEAD:block-110-sketch-live-drag
